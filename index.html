<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oops...</title>
    <meta
      name="description"
      content="A clean, illustrated error page with retry, home, and contact actions."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="error-page">
      <section class="hero">
        <h1>Oops...</h1>
        <p class="message">
          Looks like something went wrong.<br />
          We're working on it.
        </p>

        <div class="actions" aria-label="Error page actions">
          <a class="action" href="#">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" role="img">
                <circle cx="28" cy="28" r="14"></circle>
                <path d="M38 38l10 10"></path>
              </svg>
            </span>
            <span class="label">Try Again</span>
          </a>
          <a class="action" href="#">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" role="img">
                <path d="M12 30l20-16 20 16"></path>
                <path d="M18 28v22h28V28"></path>
                <path d="M28 50V36h8v14"></path>
              </svg>
            </span>
            <span class="label">Go Home</span>
          </a>
          <a class="action" href="mailto:hello@example.com">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" role="img">
                <rect x="12" y="18" width="40" height="28" rx="2"></rect>
                <path d="M14 22l18 14 18-14"></path>
              </svg>
            </span>
            <span class="label">Contact Us</span>
          </a>
        </div>
      </section>

      <section class="illustration" aria-hidden="true">
        <div class="wire wire-left"></div>
        <div class="wire wire-right"></div>

        <div class="character">
          <div class="head"></div>
          <div class="neck"></div>
          <div class="torso">
            <span class="bolt"></span>
          </div>
          <div class="arm arm-left">
            <span class="hand"></span>
            <span class="plug plug-left"></span>
          </div>
          <div class="arm arm-right">
            <span class="hand"></span>
            <span class="plug plug-right"></span>
          </div>
          <div class="shorts"></div>
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
          <div class="shoe shoe-left"></div>
          <div class="shoe shoe-right"></div>
          <div class="shadow"></div>
        </div>
      </section>
    </main>
  </body>
</html>
